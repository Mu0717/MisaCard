version: '3.8'

services:
  misacard-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: misacard-manager
    restart: unless-stopped
    # 移除被局域网外直接访问的端口，只供内部 Caddy 反向代理
    volumes:
      # 持久化数据库文件
      - ./data:/app/data
      # 如果需要自定义配置，取消下面注释
      # - ./.env:/app/.env
    environment:
      # 基础配置
      - HOST=0.0.0.0
      - PORT=8000
      - DEBUG=false
      # 数据库配置（使用容器内路径）
      - DATABASE_URL=sqlite:///./data/cards.db
      # 时区设置
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - misacard-network

  # 新增 Caddy 反向代理自动维护 HTTPS 的容器
  caddy:
    image: caddy:2-alpine
    container_name: misacard-caddy
    restart: unless-stopped
    ports:
      - "80:80"   # HTTP 用于自动申请免费证书验证
      - "443:443" # 业务主要走 HTTPS 加密通道
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - misacard-network
    depends_on:
      - misacard-manager

networks:
  misacard-network:
    driver: bridge

volumes:
  misacard-data:
  caddy_data:
  caddy_config:

